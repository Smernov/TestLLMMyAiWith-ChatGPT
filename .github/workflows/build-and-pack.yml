name: Build & Package Hub

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: [3.11]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential patchelf zip

      - name: Install system deps (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install -y python3
        shell: powershell

      - name: Create venv
        run: |
          python -m venv .venv
          if [ -f .venv/bin/activate ]; then
            . .venv/bin/activate
          else
            .venv\Scripts\activate
          fi
          python -m pip install --upgrade pip
        shell: bash

      - name: Install Python deps (light for CI)
        run: |
          if [ -f .venv/bin/activate ]; then
            . .venv/bin/activate
          else
            .venv\Scripts\activate
          fi
          pip install --upgrade pip
          pip install rich transformers sentencepiece pyinstaller
        shell: bash

      - name: Run py_compile smoke test
        run: |
          if [ -f hub_finetune.py ]; then
            python -m py_compile hub_finetune.py
          elif [ -f hub.py ]; then
            python -m py_compile hub.py
          else
            echo "No entry script found" && exit 1
          fi
        shell: bash

      - name: Package with PyInstaller
        run: |
          if [ -f hub_finetune.py ]; then
            ENTRY=hub_finetune.py
          elif [ -f hub.py ]; then
            ENTRY=hub.py
          else
            echo "No entry script found" && exit 1
          fi
          echo "Entry: $ENTRY"
          rm -rf build dist __pycache__ "${ENTRY%.*}.spec" || true
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # On windows runner we still run bash; produce one-folder for reliability
            pyinstaller --noconfirm --clean --onedir "$ENTRY"
          else
            pyinstaller --noconfirm --clean --onedir "$ENTRY"
          fi
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            dist
            build
            "${{ github.workspace }}"
