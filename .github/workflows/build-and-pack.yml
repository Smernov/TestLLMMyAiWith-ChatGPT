name: Build & Package Hub

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential patchelf zip

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install rich transformers sentencepiece pyinstaller

      - name: Run py_compile smoke test
        shell: bash
        run: |
          if [ -f hub_finetune.py ]; then
            python -m py_compile hub_finetune.py
          elif [ -f hub.py ]; then
            python -m py_compile hub.py
          else
            echo "No entry script found" && exit 1
          fi

      - name: Package with PyInstaller
        shell: bash
        run: |
          if [ -f hub_finetune.py ]; then ENTRY=hub_finetune.py
          elif [ -f hub.py ]; then ENTRY=hub.py
          else echo "No entry script found" && exit 1
          fi
          rm -rf build dist __pycache__ "${ENTRY%.*}.spec" || true
          pyinstaller --noconfirm --clean --onedir "$ENTRY"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            dist
            build
