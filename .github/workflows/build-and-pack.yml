name: Build & Package Hub

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: [3.11]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential patchelf zip

      - name: Create venv
        run: |
          python -m venv .venv

      - name: Upgrade pip + install deps
        run: |
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install rich transformers sentencepiece pyinstaller
        if: matrix.os == 'ubuntu-latest'

      - name: Upgrade pip + install deps (Windows)
        run: |
          .venv\Scripts\python -m pip install --upgrade pip
          .venv\Scripts\pip install rich transformers sentencepiece pyinstaller
        if: matrix.os == 'windows-latest'

      - name: Smoke test
        run: |
          if [ -f hub_finetune.py ]; then python -m py_compile hub_finetune.py
          elif [ -f hub.py ]; then python -m py_compile hub.py
          else echo "No entry script found" && exit 1
          fi
        shell: bash
        if: matrix.os == 'ubuntu-latest'

      - name: Smoke test (Windows)
        run: |
          if (Test-Path hub_finetune.py) { python -m py_compile hub_finetune.py }
          elseif (Test-Path hub.py) { python -m py_compile hub.py }
          else { Write-Error "No entry script found"; exit 1 }
        if: matrix.os == 'windows-latest'

      - name: Package (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          ENTRY=$( [ -f hub_finetune.py ] && echo hub_finetune.py || echo hub.py )
          rm -rf build dist __pycache__ *.spec || true
          .venv/bin/pyinstaller --noconfirm --clean --onedir "$ENTRY"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          if (Test-Path hub_finetune.py) { $ENTRY = 'hub_finetune.py' } else { $ENTRY = 'hub.py' }
          Remove-Item -Recurse -Force build,dist,__pycache__ -ErrorAction SilentlyContinue
          .venv\Scripts\pyinstaller --noconfirm --clean --onedir $ENTRY

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist
